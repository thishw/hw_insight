baseURL = "https://insight.thishw.com/"
title = "HW Insight"
defaultContentLanguage = "ko"
enableRobotsTXT = true

# 홈에서 검색 색인(index.json) 생성 — 공통 Module의 클라이언트 검색이 사용
[outputs]
  home = ["HTML", "RSS", "JSON", "llms"]

# llms.txt — LLM용 사이트 인덱스 (GEO 실험)
[outputFormats.llms]
  mediaType = "text/plain"
  baseName  = "llms"
  isPlainText = true

[params]
  author         = "HW"
  site_key       = "hw_insight"
  tier           = "A"
  description    = "사고를 구조로, 구조를 발행으로 — 지식 인사이트"
  og_site_name   = "HW Insight"
  og_locale      = "ko_KR"
  og_image       = ""
  gtm_id         = "GTM-5B6XBNBH"
  verify_google  = ""
  verify_naver   = ""
  verify_bing    = ""
  adsense_pub_id = ""
  daum_verification = ""

[taxonomies]
  category = "categories"

[[menu.main]]
  name   = "홈"
  url    = "/"
  weight = 1

[[menu.main]]
  name   = "테크"
  url    = "/categories/테크/"
  weight = 2

[[menu.main]]
  name   = "투자"
  url    = "/categories/투자/"
  weight = 3

[[menu.main]]
  name   = "생각"
  url    = "/categories/생각/"
  weight = 4

[markup.goldmark.renderer]
  unsafe = true

[module]
  [[module.imports]]
    path = "github.com/thishw/synapse-hugo-shared"
