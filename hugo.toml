baseURL = "https://insight.thishw.com/"
title = "HW Insight"
defaultContentLanguage = "ko"
# ko는 접미사 없이 루트에 그대로 유지(/posts/...), en만 /en/ 프리픽스가 붙는다 —
# 기존 한국어 URL을 안 바꿔서 기존 SEO 점수/백링크를 그대로 보존한다.
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

# 콘텐츠는 파일명 접미사로 번역쌍을 묶는다(date-slug.md=ko, date-slug.en.md=en) —
# src/output/static_site.py::hugo_page_path()가 이 규칙에 맞춰 발행한다.
[languages]
  [languages.ko]
    label = "한국어"
    weight = 1
  [languages.en]
    label = "English"
    weight = 2

# 홈에서 검색 색인(index.json) 생성 — 공통 Module의 클라이언트 검색이 사용
[outputs]
  home = ["HTML", "RSS", "JSON", "llms"]

# llms.txt — LLM용 사이트 인덱스 (GEO 실험)
[outputFormats.llms]
  mediaType = "text/plain"
  baseName  = "llms"
  isPlainText = true

[params]
  author         = "HW"
  site_key       = "hw_insight"
  tier           = "A"
  description    = "사고를 구조로, 구조를 발행으로 — 지식 인사이트"
  og_site_name   = "HW Insight"
  og_locale      = "ko_KR"
  og_image       = "images/og-default.png"
  gtm_id         = "GTM-5B6XBNBH"
  verify_google  = ""
  verify_naver   = "67558bc01f225a55bd4fcf6dc0afd7188dbf5d70"
  verify_bing    = ""
  adsense_pub_id = ""
  daum_verification = ""

[taxonomies]
  category = "categories"

[[menu.main]]
  name   = "홈"
  url    = "/"
  weight = 1

[[menu.main]]
  name   = "테크"
  url    = "/categories/테크/"
  weight = 2

[[menu.main]]
  name   = "투자"
  url    = "/categories/투자/"
  weight = 3

[[menu.main]]
  name   = "생각"
  url    = "/categories/생각/"
  weight = 4

[markup.goldmark.renderer]
  unsafe = true

[module]
  [[module.imports]]
    path = "github.com/thishw/synapse-hugo-shared"
