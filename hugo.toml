baseURL = "https://insight.thishw.com/"
title = "hw_insight"
defaultContentLanguage = "ko"
enableRobotsTXT = true

# 홈에서 검색 색인(index.json) 생성 — 공통 Module의 클라이언트 검색이 사용
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  site_key       = "hw_insight"
  tier           = "A"
  description    = "사고를 구조로, 구조를 발행으로 — 지식 인사이트"
  og_site_name   = "HW Insight"
  og_locale      = "ko_KR"
  og_image       = ""
  gtm_id         = "GTM-5B6XBNBH"
  verify_google  = ""
  verify_naver   = ""
  verify_bing    = ""
  adsense_pub_id = ""
  daum_verification = ""

[taxonomies]
  category = "categories"
  tag      = "tags"

[[menu.main]]
  name   = "홈"
  url    = "/"
  weight = 1

[[menu.main]]
  name   = "글"
  url    = "/posts/"
  weight = 2

[[menu.main]]
  name   = "AI"
  url    = "/categories/ai/"
  weight = 3

[[menu.main]]
  name   = "개발"
  url    = "/categories/개발/"
  weight = 4

[[menu.main]]
  name   = "투자"
  url    = "/categories/투자/"
  weight = 5

[[menu.main]]
  name   = "지식시스템"
  url    = "/categories/지식시스템/"
  weight = 6

[[menu.main]]
  name   = "전략"
  url    = "/categories/전략/"
  weight = 7

[markup.goldmark.renderer]
  unsafe = true

[module]
  [[module.imports]]
    path = "github.com/thishw/synapse-hugo-shared"
