name: Lint articles
on:
  pull_request:
    paths: ["content/**"]
  push:
    branches: [main]
    paths: ["content/**"]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python3 scripts/lint_articles.py content/posts
